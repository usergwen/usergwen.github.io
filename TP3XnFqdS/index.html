<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
    back2TopText = document.querySelector('#back_to_top_text'),
    drawerBox = document.querySelector('#drawer_box'),
    rightSideBar = document.querySelector('.sidebar'),
    viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {

    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function (e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });

  window.addEventListener('scroll', function (e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });


  let hasCacu = false;
  window.onresize = function () {
    calcuHeight();
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();

  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function () {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function () {
            window.Velocity(rightMotions, transitionDir, {});
          }
        })
        window.Velocity(viewport, openProp, {
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function () {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp, {
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转

    });
  }

          &lt;h1 id=&#34;写在前面&#34;&gt;写在前面&lt;/h1&gt;
&lt;p&gt;至少此刻，在当下，算是之前种种告了一个段落，是的，我内心承认过去的一个阶段，所以，抽了些时间，好好写写我毕业这五年的工作经历和学到的一些东西。&lt;/p&gt;
&lt;p&gt;事实上，在这五年里，我真正工作的时间大概有四年多一些，中间有两次半年的空窗期。这是写给自己的一篇回忆录，希望，在我告别之前的生活节奏和一些人之时，划上一个句号。&lt;/p&gt;
&lt;h1 id=&#34;一些经历&#34;&gt;一些经历&lt;/h1&gt;
&lt;h2 id=&#34;大学经历&#34;&gt;大学经历&lt;/h2&gt;
&lt;p&gt;大学时代，是我最放纵的时代，仿佛从学生时代走过来，所有的家庭压抑一下子释放了，导致自律被完全抛弃，误把放纵作自由。&lt;/p&gt;
&lt;p&gt;这四年，是我最后悔的四年，经历了很多，遇到了很多，也放弃了很多。事实上，这四年对于之前的我，确实是让我足够悔恨的，如今，终于能够坦然面对过去那段经历了。不管是人，学习还是别的什么。&lt;/p&gt;
&lt;h2 id=&#34;工作经历&#34;&gt;工作经历&lt;/h2&gt;
&lt;p&gt;毕业后，一共经历了两家公司，都是创业型公司，没有任何大厂经历。说起来，这个和我自身的性格有着密不可分的关系。&lt;/p&gt;
&lt;p&gt;关于我自身的性格，中间存在一整个过渡期。只有两家公司，第一家就称作W，第二家称作B吧。&lt;/p&gt;
&lt;p&gt;在W的时候，因为刚毕业，加上之前的一些心理问题，在这家公司的时候，整个人都是阴沉，敏感的，阴沉体现在，学会了人前一套，背后一套，甚至有的时候会在背后吐槽同事，这些斑斑劣迹在如今的我看来，是很讨厌的一些行为。是的，我讨厌这些行为，而我自己却做过不少。&lt;/p&gt;
&lt;p&gt;敏感，因为多疑，这种过度揣测别人的心境，从高中一路带过来，经历了大学时代，依然没有好转，我后面想到，我没有认清自己的位置，也没有尝试去了解自己，这是根植在心底的不自信，应该是自卑。&lt;/p&gt;
&lt;p&gt;刚好赶上了2018年底到2019年初的裁员潮，于是离开了这家公司。&lt;/p&gt;
&lt;p&gt;在后面近五个月的时间，我迎来了价值观，人生观的第一次转折，因为在这家公司，感谢之前领导的一些培训，确实获得了一些专业知识的积累。&lt;/p&gt;
&lt;p&gt;后面，我入职了第二家公司B，一个初创业的在线教育公司，其实，在2019年底，公司摇摇欲坠，裁员了一批，但是，新冠疫情来了，给这个公司带来了一线生机。在这家公司的一年时间，无论是专业技术，还是职场经历上，比之前，应该是跨上了整个台阶，收获很多，但是，走的也决绝。&lt;/p&gt;
&lt;p&gt;从B离职，原因很复杂，最主要的两点，一是工作内容已经偏离了我的个人职业规划，二是我再寻找第二次跨上一个台阶的机会。&lt;/p&gt;
&lt;p&gt;这里的台阶，不是说往上晋升职位什么的，两个方面，一是我希望打破功能测试的舒适区，直面转测试开发的职业目标，二是我想花时间仔细想想我想成为什么样的人，于是，在B整体发展向上的时候，我选择了离开。&lt;/p&gt;
&lt;h1 id=&#34;一些成长&#34;&gt;一些成长&lt;/h1&gt;
&lt;h2 id=&#34;自我发展&#34;&gt;自我发展&lt;/h2&gt;
&lt;p&gt;不谈过去，只谈现在。&lt;/p&gt;
&lt;p&gt;最重要的应该是思维模式和学习方法上的转变吧，我学习了很多心理学知识，看了一些书，至于具体是哪些，这里就不展开了，因为人的转变都是源于自己内心放过了自己，才能够真的开启转折。&lt;/p&gt;
&lt;p&gt;两点吧，一个是成长型思维模式的刻意养成，一个是刻意练习的方法论掌握。成长型思维模式带我走出了低迷的过往，刻意练习带我走向了未来可期。&lt;/p&gt;
&lt;p&gt;这里不是说什么方法能推动人生的正向发展，因为没有绝对的万能方法，对于我来说，转变就是一瞬间的事情，当想要改变的内在动力进入了潜意识，就开始了。人是时间的宠儿，为什么这么说呢。所遇所见，所听所想，都是时间给的馈赠。思维的不同，解剖问题的角度不同，这些馈赠发挥在自己身上的作用也就不一样。&lt;/p&gt;
&lt;h2 id=&#34;专业技术&#34;&gt;专业技术&lt;/h2&gt;
&lt;p&gt;说起这个，确实要感谢在W时的第一位主管，刚毕业，还在做着功能测试的我，就接触到了自动化测试的相关知识。那时跟着主管，学了java和appium，东西不多，很基础，但是为我的职业发展打开了一个通道。&lt;/p&gt;
&lt;p&gt;现在已经完全转向了python，python是最适合我的语言，没有之一。&lt;/p&gt;
&lt;p&gt;我比较认同的观点是，语言是一种工具，找到适合自己的语言，用的顺手的，就达到了工欲善其事，必先利其器。因为，我自己体验过跟风学java，c++之类的，最后一无所获。适合自己最重要。&lt;/p&gt;
&lt;p&gt;在B的时候，更多是在打通高速公路的阶段，零散的知识点学了很多，但是不成体系，没法真正学以致用。然后进入学了忘，忘了学的恶性循环，很难有大的进步。&lt;/p&gt;
&lt;p&gt;比如，数据结构和算法，半途而废，开始就被劝退，真的太真实了。但是，面试必考，不得不学。大多数书籍，课程基本都是劝退流，别不信，深有体会。只有吃过盲目跟风的苦，才知道科学方法论的甜。&lt;/p&gt;
&lt;h1 id=&#34;当下准备&#34;&gt;当下准备&lt;/h1&gt;
&lt;p&gt;临近年关，在准备了一个月的面试后，到了总结输出的时候了，计划将这一个月的知识都总结输出出来，不管年后面试结果如何，我希望努力的过程我是快乐的。&lt;/p&gt;

        <a class="result-title" style="opacity: 0;" href="https://usergwen.github.io/CuLQ36g4j/"" data-c="
          &lt;h1 id=&#34;python源码阅读-dict&#34;&gt;Python源码阅读 - Dict&lt;/h1&gt;
&lt;h2 id=&#34;1-源码位置&#34;&gt;1. 源码位置&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Include/dictobject.h&#34;&gt;&lt;code&gt;include/dictobject.h&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Include/cpython/dictobject.h&#34;&gt;&lt;code&gt;Include/cpython/dictobject.h&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Objects/dictobject.c&#34;&gt;&lt;code&gt;Objects/dictobject.c&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Objects/dict-common.h&#34;&gt;&lt;code&gt;dict-common.h&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Objects/dictnotes.txt&#34;&gt;&lt;code&gt;dictnotes.txt&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;2-pydictobject&#34;&gt;2. &lt;code&gt;PyDictObject&lt;/code&gt;&lt;/h2&gt;
&lt;blockquote&gt;
&lt;ol&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;PyDictObject&lt;/code&gt;对搜索效率要求极为严苛，底层采用了 hash table 散列表&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;什么是散列表？&lt;/p&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;散列表基本思想是通过一定函数讲需要搜索的数据的键值映射为一个整数，这个整数视为索引去访问一片连续的内存区域&lt;/p&gt;
&lt;p&gt;Python中解决散列冲突的方式是开放定址法，不同于开链表的方式，Python采用二次探测函数在发生散列冲突时，计算下一个可用地址&lt;/p&gt;
&lt;p&gt;这种开放定址法有一个缺点就是，不能删除探测链上的元素，否则探测链断裂后果很严重，所以python中会采用伪删除&lt;/p&gt;
&lt;/blockquote&gt;
&lt;h3 id=&#34;21-dictnotestxt通读摘抄&#34;&gt;2.1 &lt;code&gt;dictnotes.txt&lt;/code&gt;通读摘抄&lt;/h3&gt;
&lt;ol&gt;
&lt;li&gt;
&lt;p&gt;应用方面：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;关键字参数查找：一般1-3个元素，一个读一个写&lt;/li&gt;
&lt;li&gt;类方法查找：一般8-16个元素，会出现基于基类的很多失败查找&lt;/li&gt;
&lt;li&gt;实例属性和全局变量：一般4-10各元素，很常见的读写&lt;/li&gt;
&lt;li&gt;内置命令：一般150个内部字符串，会频繁读取，但不会写入&lt;/li&gt;
&lt;li&gt;删除重复keys：dict.fromkeys(seqn).keys()&lt;/li&gt;
&lt;li&gt;统计序列元素：d[e] = d.get(e,0) + 1&lt;/li&gt;
&lt;li&gt;动态映射：以删除，插入，替换为主要特点，这时候采用虚拟表项会极大提高性能&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;数据存储：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;dictobject结构体本身&lt;/li&gt;
&lt;li&gt;dict-keys对象(键和散列)&lt;/li&gt;
&lt;li&gt;值数组&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;h3 id=&#34;22-pydictobject&#34;&gt;2.2 &lt;code&gt;PyDictObject&lt;/code&gt;&lt;/h3&gt;
&lt;pre&gt;&lt;code&gt;layout:
+---------------+
| dk_refcnt     |
| dk_size       |
| dk_lookup     |
| dk_usable     |
| dk_nentries   |
+---------------+
| dk_indices    |   //dk_indices 是一个共用体，会根据 dk_size 的值，决定存储 index 的类型
|               |
+---------------+
| dk_entries    |
|               |
+---------------+
&lt;/code&gt;&lt;/pre&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;typedef struct _dictkeysobject PyDictKeysObject;

// key和value分离存储，分别是ma_keys和ma_values两个表中
typedef struct {
    PyObject_HEAD //Python3中的字典对象被归类到Concrete Objects
    Py_ssize_t ma_used;
    uint64_t ma_version_tag;
    PyDictKeysObject *ma_keys;
    PyObject **ma_values; // 当ma_values不是null的时候，代表keys和values是被分离存储的，反之，表示键值对被组合存储在ma_keys中
} PyDictObject;
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;23-pydictkeysobject&#34;&gt;2.3 &lt;code&gt;PyDictKeysObject&lt;/code&gt;&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;struct _dictkeysobject {
    Py_ssize_t dk_refcnt;
    Py_ssize_t dk_size; //哈希表大小，一定是2的幂，决定索引的大小
    
    dict_lookup_func dk_lookup; //查找函数
    
    Py_ssize_t dk_usable; //字典不可用元素个数
    Py_ssize_t dk_nentries; //字典可用元素个数

    char dk_indices[]; //使用char避免混淆，是dk_size的实际哈希表，保存dk_entries的索引
};
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;24-pydictkeyentry&#34;&gt;2.4 &lt;code&gt;PyDictKeyEntry&lt;/code&gt;&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;//为什么使用负数作为键值对的状态，是因为dk_indices中使用有符号整数
//dk_entries中存储PyDictKeyEntry对象，每个元素是一个entry，可以被宏DK_ENTRIES访问entry
#define DKIX_EMPTY (-1)
#define DKIX_DUMMY (-2)  
#define DKIX_ERROR (-3)
typedef struct {
    Py_hash_t me_hash; //缓存ma_key的hash code
    PyObject *me_key;
    PyObject *me_value; //这块只对组合存储有意义，分离存储可以不考虑
} PyDictKeyEntry;
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;25-dk_indices&#34;&gt;2.5 &lt;code&gt;dk_indices&lt;/code&gt;&lt;/h3&gt;
&lt;blockquote&gt;
&lt;p&gt;实际的hash table，对应一个slot数组，每个数组四种状态&lt;/p&gt;
&lt;/blockquote&gt;
&lt;pre&gt;&lt;code&gt;1. Unused
    键值对当前和曾经都未使用，是初始状态
2. Active
    键值对当前被使用处于活动状态，可以过度到虚拟状态和删除挂起状态，也就是ma_values不是null的唯一情况
3. Dummy
    键值对处于虚拟状态，可以理解为假死状态，
    因为字典对象底层使用开放定址法解决散列冲突问题，所以在探测函数寻找可用地址时，不能让探测链断裂，也就是删除探测链上的元素，
    所以，删除元素时会从Active过度到Dummy状态，没有被真正删除
4. Pending
    键值对处于挂起状态，会在元素还未在分离表中插入时存在的一种状态
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;26-创建字典-pydict_new&#34;&gt;2.6 创建字典 &lt;code&gt;PyDict_New&lt;/code&gt;&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;PyObject *
PyDict_New(void)
{
    dictkeys_incref(Py_EMPTY_KEYS);
    return new_dict(Py_EMPTY_KEYS, empty_values);
}

// 对象缓冲池，与listobject类似的，销毁时会放入对象缓冲池，也牵扯出共享机制dict_dealloc
// keys对象
static PyDictKeysObject *new_keys_object(Py_ssize_t size)
{
    PyDictKeysObject *dk;
    Py_ssize_t es, usable;

    assert(size &amp;gt;= PyDict_MINSIZE); //字典起始的大小是8
    assert(IS_POWER_OF_2(size)); //必须是2的幂

    // len(dk_entries) == USABLE_FRACTION(dk_size)，最小是5，(((n) &amp;lt;&amp;lt; 1)/3) - 注意对象缓冲池 keys_free_list
    usable = USABLE_FRACTION(size); //根据size大小，确定内存空间
    if (size &amp;lt;= 0xff) {
        es = 1;
    }
    else if (size &amp;lt;= 0xffff) {
        es = 2;
    }
#if SIZEOF_VOID_P &amp;gt; 4
    else if (size &amp;lt;= 0xffffffff) {
        es = 4;
    }
#endif
    else {
        es = sizeof(Py_ssize_t);
    }

#if PyDict_MAXFREELIST &amp;gt; 0
    if (size == PyDict_MINSIZE &amp;amp;&amp;amp; numfreekeys &amp;gt; 0) {
        dk = keys_free_list[--numfreekeys];
    }
    else
#endif
    {
        dk = PyObject_MALLOC(sizeof(PyDictKeysObject)
                             + es * size
                             + sizeof(PyDictKeyEntry) * usable);
        if (dk == NULL) {
            PyErr_NoMemory();
            return NULL;
        }
    }
#ifdef Py_REF_DEBUG
    _Py_RefTotal++;
#endif
    dk-&amp;gt;dk_refcnt = 1;
    dk-&amp;gt;dk_size = size;
    dk-&amp;gt;dk_usable = usable;
    dk-&amp;gt;dk_lookup = lookdict_unicode_nodummy;
    dk-&amp;gt;dk_nentries = 0;
    memset(&amp;amp;dk-&amp;gt;dk_indices[0], 0xff, es * size); //初始化dk_indices == -1
    memset(DK_ENTRIES(dk), 0, sizeof(PyDictKeyEntry) * usable); //初始化dk_entries == 0
    return dk;
}

//对keys对象的引用
static PyObject *
new_dict(PyDictKeysObject *keys, PyObject **values)
{
    PyDictObject *mp;
    assert(keys != NULL);
#if PyDict_MAXFREELIST &amp;gt; 0
    if (numfree) {
        mp = free_list[--numfree];
        assert (mp != NULL);
        assert (Py_IS_TYPE(mp, &amp;amp;PyDict_Type));
        _Py_NewReference((PyObject *)mp);
    }
    else
#endif
    {
        mp = PyObject_GC_New(PyDictObject, &amp;amp;PyDict_Type);
        if (mp == NULL) {
            dictkeys_decref(keys);
            if (values != empty_values) {
                free_values(values);
            }
            return NULL;
        }
    }
    mp-&amp;gt;ma_keys = keys;
    mp-&amp;gt;ma_values = values;
    mp-&amp;gt;ma_used = 0;
    mp-&amp;gt;ma_version_tag = DICT_NEXT_VERSION();
    ASSERT_CONSISTENT(mp);
    return (PyObject *)mp;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;27-methods&#34;&gt;2.7 Methods&lt;/h3&gt;
&lt;blockquote&gt;
&lt;p&gt;字典的增删查改，这里就举一个例子 GetItem&lt;/p&gt;
&lt;/blockquote&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;PyObject *
PyDict_GetItem(PyObject *op, PyObject *key)
{
    Py_hash_t hash;
    Py_ssize_t ix;
    PyDictObject *mp = (PyDictObject *)op;
    PyThreadState *tstate;
    PyObject *value;

    //获取计算hash值
    if (!PyDict_Check(op))
        return NULL;
    if (!PyUnicode_CheckExact(key) ||
        (hash = ((PyASCIIObject *) key)-&amp;gt;hash) == -1)
    {
        hash = PyObject_Hash(key);
        if (hash == -1) {
            PyErr_Clear();
            return NULL;
        }
    }

    //在初始化过程中null的异常处理
    tstate = _PyThreadState_GET();
    if (tstate != NULL &amp;amp;&amp;amp; tstate-&amp;gt;curexc_type != NULL) {
        PyObject *err_type, *err_value, *err_tb;
        PyErr_Fetch(&amp;amp;err_type, &amp;amp;err_value, &amp;amp;err_tb);
        ix = (mp-&amp;gt;ma_keys-&amp;gt;dk_lookup)(mp, key, hash, &amp;amp;value);
        PyErr_Restore(err_type, err_value, err_tb);
        if (ix &amp;lt; 0)
            return NULL;
    }
    else {
        // 查找index，返回ix&amp;gt;0或者ix==-1or-3
        ix = (mp-&amp;gt;ma_keys-&amp;gt;dk_lookup)(mp, key, hash, &amp;amp;value);
        if (ix &amp;lt; 0) {
            PyErr_Clear();
            return NULL;
        }
    }
    return value;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;blockquote&gt;
&lt;p&gt;源码注释非常详细，代码足够优雅，此处就不赘述了，重要的是掌握方法论，然后能够在实际使用过程中举一反三&lt;/p&gt;
&lt;/blockquote&gt;

        <a class="result-title" style="opacity: 0;" href="https://usergwen.github.io/wHrHzHUcH/"" data-c="
          &lt;h1 id=&#34;一-python源码阅读-list&#34;&gt;一、Python源码阅读 - List&lt;/h1&gt;
&lt;h2 id=&#34;1-源码位置&#34;&gt;1. 源码位置&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Include/listobject.h&#34;&gt;&lt;code&gt;include/listobject.h&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Include/cpython/listobject.h&#34;&gt;&lt;code&gt;Include/cpython/listobject.h&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;&lt;a href=&#34;https://github.com/python/cpython/blob/3.9/Objects/listobject.c&#34;&gt;&lt;code&gt;Objects/listobject.c&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;2-pylistobject的函数&#34;&gt;2. &lt;code&gt;PyListObject&lt;/code&gt;的函数&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// include/listobject.h

/**
* 分析：
* 1. PyListObject支持元素的插入，添加，删除等操作
*   -&amp;gt; PyList_SetItem
*   -&amp;gt; PyList_Insert
*   -&amp;gt; PyList_Append
*   -&amp;gt; PyList_SetSlice
*   -&amp;gt; PyList_Sort
*   -&amp;gt; PyList_Reverse
* 2. 在列表元素中，无一例外存放的都是PyObject *指针，而且PyListObject对象一定是一个可变长对象
**/
PyAPI_FUNC(PyObject *) PyList_New(Py_ssize_t size);
PyAPI_FUNC(Py_ssize_t) PyList_Size(PyObject *);

PyAPI_FUNC(PyObject *) PyList_GetItem(PyObject *, Py_ssize_t);
PyAPI_FUNC(int) PyList_SetItem(PyObject *, Py_ssize_t, PyObject *);
PyAPI_FUNC(int) PyList_Insert(PyObject *, Py_ssize_t, PyObject *);
PyAPI_FUNC(int) PyList_Append(PyObject *, PyObject *);

PyAPI_FUNC(PyObject *) PyList_GetSlice(PyObject *, Py_ssize_t, Py_ssize_t);
PyAPI_FUNC(int) PyList_SetSlice(PyObject *, Py_ssize_t, Py_ssize_t, PyObject *);

PyAPI_FUNC(int) PyList_Sort(PyObject *);
PyAPI_FUNC(int) PyList_Reverse(PyObject *);
PyAPI_FUNC(PyObject *) PyList_AsTuple(PyObject *);
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;3-pylistobject的定义&#34;&gt;3. &lt;code&gt;PyListObject&lt;/code&gt;的定义&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// Include/cpython/listobject.h
typedef struct {
    // PyListObject 对象的头，有一个ob_size
    PyObject_VAR_HEAD
    // ob_item 是指向元素列表的指针，python列表中的list[0]其实就是ob_item[0]
    PyObject **ob_item;
    // allocated 数值正是维护元素列表（PyObject*列表）的关键，指针指向了元素列表所在的内存首地址，它正是维护了当前列表可容纳元素总数
    // 对应ob_size而言，allocated为了避免频繁插入删除预先会申请比实际大小大一些的内存，而ob_size是当前列表已被使用的实际内存大小，这个和python的内存管理策略相关
    Py_ssize_t allocated;
} PyListObject;
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;3-pylistobject的创建&#34;&gt;3. &lt;code&gt;PyListObject&lt;/code&gt;的创建&lt;/h2&gt;
&lt;blockquote&gt;
&lt;p&gt;&lt;code&gt;Objects/listobject.c&lt;/code&gt;&lt;/p&gt;
&lt;/blockquote&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// 唯一的创建list的途径

/**
* Python对列表的创建动作分为两部分：
* 1. PyListObject对象本身
* 2. PyListObject对象维护的元素列表
* 这两块分离的内存和ob_item建立联系
* PyListObject对象被创建之后，会立刻调用size参数创建可维护元素列表，并会初始化每一个元素为NULL
**/
PyObject *
PyList_New(Py_ssize_t size)  // 这个函数接受一个size参数，创建list时可以指定初始元素个数
{
    PyListObject *op;

    if (size &amp;lt; 0) {
        PyErr_BadInternalCall();
        return NULL;
    }
    // 为list对象申请内存
    if (numfree) {
        // 缓冲池可用
        numfree--;
        op = free_list[numfree];
        _Py_NewReference((PyObject *)op);
    } else {
        // 缓冲池不可用
        op = PyObject_GC_New(PyListObject, &amp;amp;PyList_Type);
        if (op == NULL)
            return NULL;
    }
    // 为list维护的元素列表申请内存
    if (size &amp;lt;= 0)
        op-&amp;gt;ob_item = NULL;
    else {
        // 内存溢出检查
        op-&amp;gt;ob_item = (PyObject **) PyMem_Calloc(size, sizeof(PyObject *));
        if (op-&amp;gt;ob_item == NULL) {
            Py_DECREF(op);
            return PyErr_NoMemory();
        }
    }
    Py_SET_SIZE(op, size);
    op-&amp;gt;allocated = size;
    _PyObject_GC_TRACK(op);
    return (PyObject *) op;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;4-pylist_setitem&#34;&gt;4. &lt;code&gt;PyList_SetItem&lt;/code&gt;&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// 示例：list[3] = 100

int
PyList_SetItem(PyObject *op, Py_ssize_t i,
               PyObject *newitem)
{
    PyObject **p;
    // 索引检查
    if (!PyList_Check(op)) {
        Py_XDECREF(newitem);
        PyErr_BadInternalCall();
        return -1;
    }
    // 设置元素
    if (!valid_index(i, Py_SIZE(op))) {
        Py_XDECREF(newitem);
        PyErr_SetString(PyExc_IndexError,
                        &amp;quot;list assignment index out of range&amp;quot;);
        return -1;
    }
    p = ((PyListObject *)op) -&amp;gt; ob_item + i;
    Py_XSETREF(*p, newitem);
    return 0;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;5-pylist_insert&#34;&gt;5. &lt;code&gt;PyList_Insert&lt;/code&gt;&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// 示例：list.insert(3, 101)
int
PyList_Insert(PyObject *op, Py_ssize_t where, PyObject *newitem)
{
    if (!PyList_Check(op)) {
        PyErr_BadInternalCall();
        return -1;
    }
    // 类型检查
    return ins1((PyListObject *)op, where, newitem);
}

static int
app1(PyListObject *self, PyObject *v)
{
    Py_ssize_t n = PyList_GET_SIZE(self);

    assert (v != NULL);
    // 调整内存容量
    if (n == PY_SSIZE_T_MAX) {
        PyErr_SetString(PyExc_OverflowError,
            &amp;quot;cannot add more objects to list&amp;quot;);
        return -1;
    }
    // list_resize函数会判断是否重新申请内存(包括申请大小)，支持扩展列表
    if (list_resize(self, n+1) &amp;lt; 0)
        return -1;
    // 确定插入点并插入元素
    Py_INCREF(v);
    PyList_SET_ITEM(self, n, v);
    return 0;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;6-pylist_append&#34;&gt;6. &lt;code&gt;PyList_Append&lt;/code&gt;&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// 示例：list.append(102)

// 与insert类似的
int
PyList_Append(PyObject *op, PyObject *newitem)
{
    if (PyList_Check(op) &amp;amp;&amp;amp; (newitem != NULL))
        // 在list末尾插入元素
        return app1((PyListObject *)op, newitem);
    PyErr_BadInternalCall();
    return -1;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;7-list_remove&#34;&gt;7. &lt;code&gt;list_remove&lt;/code&gt;&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// 示例：list.remove(102)
static PyObject *
list_remove(PyListObject *self, PyObject *value)
/*[clinic end generated code: output=f087e1951a5e30d1 input=2dc2ba5bb2fb1f82]*/
{
    Py_ssize_t i;

    for (i = 0; i &amp;lt; Py_SIZE(self); i++) {
        PyObject *obj = self-&amp;gt;ob_item[i];
        Py_INCREF(obj);
        // 比较list中的元素和待删除元素
        int cmp = PyObject_RichCompareBool(obj, value, Py_EQ);
        Py_DECREF(obj);
        if (cmp &amp;gt; 0) {
            // 遍历结束会调用list_ass_slice函数执行删除操作
            if (list_ass_slice(self, i, i+1,
                               (PyObject *)NULL) == 0)
                Py_RETURN_NONE;
            return NULL;
        }
        else if (cmp &amp;lt; 0)
            return NULL;
    }
    PyErr_SetString(PyExc_ValueError, &amp;quot;list.remove(x): x not in list&amp;quot;);
    return NULL;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;8-list_pop&#34;&gt;8. &lt;code&gt;list_pop&lt;/code&gt;&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// 示例：list.pop(1)
// 指定索引值删除，默认是弹出最后一个元素

static PyObject *
list_pop_impl(PyListObject *self, Py_ssize_t index)
{
    PyObject *v;
    int status;
    
    // 索引检查
    if (Py_SIZE(self) == 0) {
        PyErr_SetString(PyExc_IndexError, &amp;quot;pop from empty list&amp;quot;);
        return NULL;
    }
    if (index &amp;lt; 0)
        index += Py_SIZE(self);
    if (!valid_index(index, Py_SIZE(self))) {
        PyErr_SetString(PyExc_IndexError, &amp;quot;pop index out of range&amp;quot;);
        return NULL;
    }
    // 调整内存
    v = self-&amp;gt;ob_item[index];
    if (index == Py_SIZE(self) - 1) {
        status = list_resize(self, Py_SIZE(self) - 1);
        if (status &amp;gt;= 0)
            return v; 
        else
            return NULL;
    }
    Py_INCREF(v);
    status = list_ass_slice(self, index, index+1, (PyObject *)NULL);
    if (status &amp;lt; 0) {
        Py_DECREF(v);
        return NULL;
    }
    return v;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;9-list_dealloc&#34;&gt;9. &lt;code&gt;list_dealloc&lt;/code&gt;&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-c&#34;&gt;// 最后，看一下PyListObject对象缓冲池
// 也就是一个PyListObject对象被销毁的过程，在最开始的定义对象的时候，就知道对象本身和维护元素内存分离，所以销毁也是分离的
static void
list_dealloc(PyListObject *op)
{
    Py_ssize_t i;
    PyObject_GC_UnTrack(op);
    Py_TRASHCAN_BEGIN(op, list_dealloc)
    // 销毁维护元素列表
    if (op-&amp;gt;ob_item != NULL) {
        i = Py_SIZE(op);
        while (--i &amp;gt;= 0) {
            Py_XDECREF(op-&amp;gt;ob_item[i]);
        }
        PyMem_FREE(op-&amp;gt;ob_item);
    }
    // 销毁对象本身，这个时候会先检查缓存对象数量是否已满，未满就把这个对象放到缓存中
    // 所以，后续创建新的list会先从缓存中激活这些被放入的对象，而不是重新创建新的对象
    if (numfree &amp;lt; PyList_MAXFREELIST &amp;amp;&amp;amp; PyList_CheckExact(op))
        free_list[numfree++] = op;
    else
        Py_TYPE(op)-&amp;gt;tp_free((PyObject *)op);
    Py_TRASHCAN_END
}
&lt;/code&gt;&lt;/pre&gt;

<script>
  !function () {
    let searchMask = document.querySelector('#search_mask');
    let result = document.querySelector('#result');
    let items = document.querySelectorAll('.item');
    let searchBox = document.querySelector('#search');
    let statCount = document.querySelector('#stat_count');
    let statTimes = document.querySelector('#stat_times');
    let pageUl = document.querySelector('#page_ul');
    let close = document.querySelector('#close');
    
    close.addEventListener('click', function() {
      searchMask.style = 'display: none;'
    })

    let finds = [];
    let contents = [];
    let pageSize = 10;
    items.forEach(item => {
      let a = item.querySelector('a');
      contents.push({
        title: a.innerText,
        details: a.dataset.c,
        link: a.href
      })
      item.remove();
    })

    function insertStr(soure, start, count) {
      let newStr = soure.substr(start, count);
      return soure.slice(0, start) + '<em>' + newStr + '</em>' + soure.slice(start + count);
    }

    pageUl.addEventListener('click', function(event) {
      let target = event.target;
      if (target.__proto__ === HTMLSpanElement.prototype) {
        appendResults(parseInt(target.dataset.i));
      }
    })

    function appendResults(index) {
      let htmlResult = '';
      let start = index || 0;
      let end = Math.min(start + pageSize, finds.length);
      for (let i = start; i < end; i++) {
        const current = finds[i];
        let html = current.title;
        let sum = 0;
        let positions = current.positions;
        positions.forEach(position => {
          html = insertStr(html, position.start + sum, position.count);
          sum += 9;
        })
        htmlResult += `<div class="item"><a class="result-title" href="${current.link}">${html}</a></div>`;
      }
      result.innerHTML = htmlResult;
      pageUl.innerHTML = '';
      let count = finds.length / pageSize;
      let lis = '';
      if (start !== 0) {
        lis += `<span class="fa fa-angle-left" data-i='${start - 1}'></span>`;
      }
      for (let i = 0; i < count; i++) {
        lis += `<span class='${i === start?'current':''}' data-i='${i}'>${i+1}</span>`;     
      }
      if (start+1 < count) {
        lis += `<span class="fa fa-angle-right" data-i='${start+1}'></span>`;  
      }
      pageUl.innerHTML = lis;
    }

    function search(delay) {
      let timer = null
      return function () {
        clearTimeout(timer)
        timer = setTimeout(() => {
          let start = Date.now();
          let segments = searchBox.value.split(' ').filter(c => c != '');
          if (segments.length <= 0) {
            return;
          }
          finds = [];
          let htmlResult = '';
          contents.forEach(content => {
            let title = content.title;
            let positions = [];
            let find = false;
            segments.forEach((segment) => {
              if (content.title.includes(segment)) {
                find = true;
                positions.push({
                  start: content.title.indexOf(segment),
                  count: segment.length
                })
              } else if (content.details.includes(segment)) {
                find = true;
              }
            });
            if (find) {
              finds.push({
                title: content.title,
                link: content.link,
                positions
              });
            }
          })
          appendResults(0);
          statCount.textContent = finds.length;
          statTimes.textContent = Date.now() - start;
        }, delay)
      }
    }
    searchBox.addEventListener('input', search(200));
  }()
</script>

      map.set('link', "Link: ");
      map.set('leave-message', "Leave a message");
      map.set('format', "Links Format");
      map.set('site-name', "Name: ");
      map.set('site-link', "Link: ");
      map.set('site-desc', "Desc: ");
      map.set('stat', " related results, taking ");
      map.set('stat-time', " ms");
      map.set('site-img', "Image: ");
    }

    if (map.size > 0) {
      let lanElems = document.querySelectorAll('.language');
      lanElems.forEach(elem => {
        let lan = elem.dataset.lan, text = map.get(lan);
        if (elem.__proto__ === HTMLInputElement.prototype) {
          elem.placeholder = text
        } else {
          if (elem.dataset.count) {
            text = elem.dataset.count + text;
          }
          elem.textContent = text;
        }
      })
    }
  }
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })

</script>
